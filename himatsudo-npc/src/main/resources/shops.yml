        # ▼ 使用するコスチュームプラグインのコマンドに書き換えてください
        command: "say {player} が春コスチュームを購入しました"
        display-name: "春コスチューム"

    - id: costume_summer
      material: SUNFLOWER
      display-name: "&e夏コスチューム"
      description:
        - "&7夏の輝きをまとうコスチューム"
        - "&eシーズン限定品！"
      cost: 3000
      reward:
        type: command
        command: "say {player} が夏コスチュームを購入しました"
        display-name: "夏コスチューム"

    - id: costume_autumn
      material: ORANGE_DYE
      display-name: "&6秋コスチューム"
      description:
        - "&7紅葉をイメージしたコスチューム"
        - "&eシーズン限定品！"
      cost: 3000
      reward:
        type: command
        command: "say {player} が秋コスチュームを購入しました"
        display-name: "秋コスチューム"

    - id: costume_winter
