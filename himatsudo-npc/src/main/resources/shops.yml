# [設定方法]
#   reward.command に使用するコスチュームプラグインのコマンドを設定してください。
#   {player} はプレイヤー名に自動置換されます。
#   例 (ElytraCosmetics): "ec give {player} SPRING_SUIT"
#   例 (ItemsAdder):      "ia give {player} default:spring_costume"
#
# [シーズン入れ替え方法]
#   販売しないシーズンの items エントリを削除またはコメントアウトし、
#   /hnpc reload で反映してください（サーバー再起動不要）。
# ----------------------------------------------------------
season-costume:
  display-name: "&d&lシーズン限定コスショップ"
