# ============================================================
# shops.yml — ショップ定義ファイル
# ============================================================
#
# [ショップの追加方法]
#   1. 新しいショップIDをキーにしてセクションを追加する
#   2. /hnpc reload で反映（サーバー再起動不要）
#   3. /hnpc assign <NPC-ID> shop <shop-id> でNPCと紐づける
#
# [フィールド説明]
#   display-name  : GUI タイトル (&カラーコード使用可)
#   items         : 商品リスト
#     id          : 商品の内部ID（ユニークな英数字）
#     material    : アイコン素材 (Bukkit Material 名, 大文字)
#     display-name: GUI に表示する商品名 (&カラーコード使用可)
#     description : 商品説明 (リスト形式, &カラーコード使用可)
#     cost        : 購入に必要なポイント数
#     reward      : 購入時の報酬
#       type: title   — HimatsudoNpc の称号を付与
#         title-id    : 付与する称号の内部ID
#         display-name: 称号の表示名
#       type: command — コンソールコマンドを実行
#         command     : 実行するコマンド ({player} をプレイヤー名に自動置換)
#         display-name: 購入確認メッセージ用の表示名
# ============================================================

# ----------------------------------------------------------
# 称号ショップ
# ----------------------------------------------------------
titles:
  display-name: "&6&l称号ショップ"
  items:
    - id: title_beginner
      material: WOODEN_SWORD
      display-name: "&7[ビギナー]"
      description:
        - "&7プレイ開始の証"
      cost: 50
      reward:
        type: title
        title-id: beginner
        display-name: "&7[ビギナー]"

    - id: title_active
      material: DIAMOND
      display-name: "&a[アクティブ]"
      description:
        - "&7精力的なプレイヤーの証"
      cost: 200
      reward:
        type: title
        title-id: active
        display-name: "&a[アクティブ]"

    - id: title_veteran
      material: NETHERITE_INGOT
      display-name: "&6[ベテラン]"
      description:
        - "&7長年のプレイヤーの証"
      cost: 1000
      reward:
        type: title
        title-id: veteran
        display-name: "&6[ベテラン]"

# ----------------------------------------------------------
# ペットショップ
#
# [設定方法]
#   reward.command に使用するペットプラグインのコマンドを設定してください。
#   {player} はプレイヤー名に自動置換されます。
#   例 (MyPet): "mypet capture {player} WOLF"
#   例 (EpicPets): "epicpets give {player} dog"
# ----------------------------------------------------------
pet-shop:
  display-name: "&a&lペットショップ"
  items:
    - id: pet_dog
      material: BONE
      display-name: "&f犬ペット"
      description:
        - "&7忠実な犬を連れ歩けます"
      cost: 1000
      reward:
        type: command
        # ▼ 使用するペットプラグインのコマンドに書き換えてください
        command: "say {player} が犬ペットを購入しました"
        display-name: "犬ペット"

    - id: pet_cat
      material: COD
      display-name: "&f猫ペット"
      description:
        - "&7気まぐれな猫を連れ歩けます"
      cost: 1000
      reward:
        type: command
        command: "say {player} が猫ペットを購入しました"
        display-name: "猫ペット"

    - id: pet_parrot
      material: FEATHER
      display-name: "&2オウムペット"
      description:
        - "&7カラフルなオウムを連れ歩けます"
      cost: 1500
      reward:
        type: command
        command: "say {player} がオウムペットを購入しました"
        display-name: "オウムペット"

    - id: pet_dragon
      material: NETHER_STAR
      display-name: "&5&lドラゴンペット"
      description:
        - "&7伝説のドラゴンを連れ歩けます"
        - "&c希少品！"
      cost: 10000
      reward:
        type: command
        command: "say {player} がドラゴンペットを購入しました"
        display-name: "ドラゴンペット"

# ----------------------------------------------------------
# シーズン限定コスショップ
