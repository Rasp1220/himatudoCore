      display-name: "&b冬コスチューム"
      description:
        - "&7雪と氷に包まれたコスチューム"
        - "&eシーズン限定品！"
      cost: 3000
      reward:
        type: command
        command: "say {player} が冬コスチュームを購入しました"
        display-name: "冬コスチューム"

