name: HimatsudoEvents
version: '${project.version}'
main: com.himatsudo.events.HimatsudoEvents
api-version: '1.21'
description: Treasure hunt event system for Himatsudo server
authors: [Himatsudo]
softdepend: [Citizens]

commands:
  hev:
    description: HimatsudoEvents 管理コマンド
    usage: /hev <place|remove|list|reload|progress|reset|shop|merchant>
    aliases: [himatsudo-events]

permissions:
  hev.admin:
    description: HimatsudoEvents 管理コマンドへのアクセス
    default: op
  hev.use:
    description: 宝探しイベントに参加する
    default: true
  hev.merchant:
    description: 伝説の商人ショップを利用する
    default: true
