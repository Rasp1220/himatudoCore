# ============================================================
# treasure-shop.yml — 宝探し限定ショップ定義ファイル
# ============================================================
#
# [変更方法]
#   1. このファイルを編集する
#   2. /hev reload で反映 (サーバー再起動不要)
#
# [フィールド説明]
#   display-name      : GUI タイトル (&カラーコード使用可)
#   items             : 商品リスト
#     id              : 商品の内部ID (ユニークな英数字)
#     material        : アイコン素材 (Bukkit Material 名、大文字)
#     display-name    : GUI に表示する商品名 (&カラーコード使用可)
#     description     : 商品説明 (リスト形式、&カラーコード使用可)
#     custom-model-data: (任意) リソースパック用カスタムモデルデータ (整数)
#                        省略またはコメントアウトすると通常のアイテム外観を使用
#     reward          :
#       type: command
#         command     : コンソールコマンド ({player} をプレイヤー名に自動置換)
#
# [注意]
#   各アイテムはプレイヤーごとに1回のみ受け取り可能です。
#   プレイヤーが宝を required-count 個集めると解放されます。
# ============================================================

display-name: "&6&l宝探し限定ショップ"
items:
  - id: treasure_title_explorer
    material: NETHER_STAR
    display-name: "&e&l称号 [探索者]"
    description:
      - "&7宝を全て集めた者に贈られる称号"
      - "&e限定品！"
    # custom-model-data: 1001
    reward:
      type: command
      command: "say {player} が宝探し限定称号 [探索者] を受け取りました"

  - id: treasure_cosmetic_wings
    material: ELYTRA
    display-name: "&b&l宝探し限定コスチューム"
    description:
      - "&7宝探しを完走した証のコスチューム"
      - "&e限定品！"
    # custom-model-data: 1002
    reward:
      type: command
      command: "say {player} が宝探し限定コスチュームを受け取りました"

  - id: treasure_particle_gold
    material: GOLD_INGOT
    display-name: "&6&lゴールドパーティクル"
    description:
      - "&7黄金に輝くパーティクルエフェクト"
      - "&e限定品！"
    # custom-model-data: 1003
    reward:
      type: command
      command: "say {player} がゴールドパーティクルを受け取りました"
