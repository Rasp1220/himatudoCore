name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set version in pom.xml
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} --no-transfer-progress

      - name: Build with Maven
        run: mvn -B package --no-transfer-progress -e

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HimatsudoCore v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: target/HimatsudoCore-${{ steps.version.outputs.VERSION }}.jar
