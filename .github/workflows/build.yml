name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build HimatsudoCore
        run: mvn -B package --no-transfer-progress

      - name: Build HimatsudoNpc
        run: mvn -B package --no-transfer-progress -f himatsudo-npc/pom.xml

      - name: Build HimatsudoEvents
        run: mvn -B package --no-transfer-progress -f himatsudo-events/pom.xml

      - name: Upload HimatsudoCore artifact
        uses: actions/upload-artifact@v4
        with:
          name: HimatsudoCore-SNAPSHOT
          path: target/HimatsudoCore-*.jar
          if-no-files-found: error

      - name: Upload HimatsudoNpc artifact
        uses: actions/upload-artifact@v4
        with:
          name: HimatsudoNpc-SNAPSHOT
          path: himatsudo-npc/target/HimatsudoNpc-*.jar
          if-no-files-found: error

      - name: Upload HimatsudoEvents artifact
        uses: actions/upload-artifact@v4
        with:
          name: HimatsudoEvents-SNAPSHOT
          path: himatsudo-events/target/HimatsudoEvents-*.jar
          if-no-files-found: error
