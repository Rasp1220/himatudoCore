name: HimatsudoCore
version: '${project.version}'
main: com.himatsudo.core.HimatsudoCore
api-version: '1.21'
description: Modular core plugin for Himatsudo server
authors: [Himatsudo]
website: https://himatsudo.net

commands:
  hc:
    description: HimatsudoCore メインコマンド
    usage: /hc <menu|profile|board|reload|status|version|text|help>
    aliases: [himatsudo, himatsudocore]

permissions:
  himatsudo.admin:
    description: Access to /hc admin commands
    default: op
  himatsudo.menu:
    description: Access to /menu
    default: true
  himatsudo.profile:
    description: Access to /profile command
    default: true
  himatsudo.board:
    description: Access to /board command
    default: true
