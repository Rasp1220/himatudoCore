name: HimatsudoCore
version: '${project.version}'
main: com.himatsudo.core.HimatsudoCore
api-version: '1.21'
description: Modular core plugin for Himatsudo server
authors: [Himatsudo]
website: https://himatsudo.net

commands:
  hc:
    description: HimatsudoCore admin command
    usage: /hc <reload|status|version|help>
    permission: himatsudo.admin
    aliases: [himatsudo, himatsudocore]
  menu:
    description: Open the Nexus Menu
    usage: /menu
    permission: himatsudo.menu
  profile:
    description: プレイヤープロフィールを GUI で表示する
    usage: /profile [player]
    permission: himatsudo.profile
    aliases: [prof]

permissions:
  himatsudo.admin:
    description: Access to /hc admin commands
    default: op
  himatsudo.menu:
    description: Access to /menu
    default: true
  himatsudo.profile:
    description: Access to /profile command
    default: true
