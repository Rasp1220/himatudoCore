# ============================================================
#  HimatsudoCore - config.yml
#  各モジュールの設定が独立したセクションに分かれています。
#  セクションごとに有効・無効を切り替えられます。
# ============================================================

# ------------------------------------------------------------
# ① Discord Bridge ユニット
# ------------------------------------------------------------
discord:
  # Discordへの通知を有効にするか (true / false)
  enabled: false

  # Discord Webhook URL を貼り付けてください
  webhook-url: ""

  # 通知する種別を個別に制御できます
  notify-join:  true   # プレイヤー参加通知
  notify-quit:  true   # プレイヤー退出通知
  notify-death: false  # プレイヤー死亡通知

# ------------------------------------------------------------
# ② Info Cycle ユニット (定期アナウンス)
# ------------------------------------------------------------
announce:
  # アナウンス機能を有効にするか
  enabled: true

  # アナウンスの間隔 (サーバーティック単位)
  # 20tick = 1秒 / 6000tick = 5分 / 12000tick = 10分
  interval-ticks: 6000

  # 順番に放送されるメッセージリスト
  # &カラーコード・&lボールド等が使えます
  messages:
    - "&6&l[Himatsudo] &fサーバーへようこそ！楽しいひとときをお過ごしください。"
    - "&a&l[Himatsudo] &fルールを守って楽しくプレイしましょう！"
    - "&b&l[Himatsudo] &f不具合・要望はスタッフまでお知らせください。"
    - "&e&l[Himatsudo] &f/menu でメニューを開けます。"

# ------------------------------------------------------------
# ③ Overlay Board ユニット (スコアボード)
# ------------------------------------------------------------
board:
  # スコアボード機能を有効にするか
  enabled: true

  # サイドバーのタイトル (&カラーコード使用可)
  title: "&6&lHimatsudoSMP"

  # プレイヤー参加時に自動でスコアボードを表示するか
  auto-show: true

# ------------------------------------------------------------
# ④ Nexus Menu ユニット (GUIメニュー)
# ------------------------------------------------------------
menu:
  # メニュー機能を有効にするか
  enabled: true

  # メニューインベントリのタイトル (&カラーコード使用可)
  title: "&8[ &6Nexus Menu &8]"

  # インベントリのサイズ (9の倍数: 9 / 18 / 27 / 36 / 45 / 54)
  size: 27

# ------------------------------------------------------------
# ⑤ AFK ステータス ユニット
# ------------------------------------------------------------
afk:
  # AFK 機能を有効にするか
  enabled: true

  # 何秒操作がなければ放置状態と判定するか (デフォルト: 20秒)
  timeout-seconds: 20

  # 放置チェックの実行間隔 (サーバーティック単位)
  # 100tick = 5秒ごとにチェック — 小さくすると精度が上がるが負荷も増える
  check-interval-ticks: 100

  # 放置状態に移行したときにサーバー全体へ送るメッセージ
  # {player} はプレイヤー名に置換されます / &カラーコード使用可
  message-go: "&7[AFK] &f{player} &7が放置状態になりました。"

  # 放置から復帰したときのメッセージ
  message-return: "&7[AFK] &f{player} &7が放置から戻りました。"

  # 他のプレイヤーから見た頭上の名前の前に表示するプレフィックス
  display-prefix: "&7[AFK] "

  # ------------------------------------------------
  # 段階的タイムドメッセージ
  # ------------------------------------------------
  # 指定した秒数が経過するたびに自動でメッセージを全体放送します。
  # 例: 300秒 (5分) 後・600秒 (10分) 後に通知する場合は下記のように記述。
  # - seconds に閾値秒数、message にメッセージを書いてください。
  # - エントリを増やすだけで何段階でも追加できます。
  # - 空にする場合は timed-messages: [] と書いてください。
  timed-messages:
    - seconds: 300
      message: "&e{player} &7が &e5分間 &7放置しています。"
    - seconds: 600
      message: "&e{player} &7が &e10分間 &7放置しています。"
    - seconds: 1800
      message: "&c{player} &7が &c30分間 &7放置しています。自動キックをご検討ください。"

# ------------------------------------------------------------
# ⑥ Float Text ユニット (Text Display エンティティ)
# ------------------------------------------------------------
text:
  # テキスト設置機能を有効にするか
  # ※ Minecraft 1.19.4 以降のサーバーが必要です
  enabled: true

  # テキストデータは plugins/HimatsudoCore/texts.yml に自動保存されます。
  # このファイルは手動編集も可能ですが、通常は /hc text コマンドで操作してください。
  #
  # コマンド例:
  #   /hc text create welcome-sign &6&lようこそ！\n&7Himatsudo SMP へ
  #   /hc text edit welcome-sign scale 1.5
  #   /hc text edit welcome-sign billboard CENTER
  #   /hc text edit welcome-sign background #40000000
  #   /hc text list
  #   /hc text delete welcome-sign

# ------------------------------------------------------------
# ⑦ Join Message ユニット (入退室メッセージ)
# ------------------------------------------------------------
join-message:
  # 入退室メッセージ機能を有効にするか
  enabled: true

  # ----------------
  # 初参加時メッセージ
  # ----------------
  first-join:
    # 初参加メッセージを有効にするか (false にすると通常参加メッセージが使われる)
    enabled: true
    # {player} はプレイヤー名に置換されます / &カラーコード / &#RRGGBB 使用可
    message: "&6&l★ &e{player} &6&lが初めてHimatsudoに参加しました！ &6&l★"

  # ----------------
  # 通常参加時メッセージ
  # ----------------
  join:
    message: "&7&l» &r&f{player} &7がサーバーに参加しました。"

  # ----------------
  # 退出時メッセージ
  # ----------------
  quit:
    message: "&7&l« &r&f{player} &7がサーバーから退出しました。"
  # ヒント: message を空文字 "" にするとそのメッセージを非表示にできます。

# ------------------------------------------------------------
# ⑧ Chat Format ユニット (チャット整形)
# ------------------------------------------------------------
chat:
  # チャット整形機能を有効にするか
  enabled: true

  # チャットのフォーマット
  # 使えるプレースホルダー:
  #   {prefix}  — ランク名 (prefix-color が適用されます)
  #   {player}  — プレイヤー名
  #   {message} — 送信されたメッセージ本文
  format: "&8[{prefix}&8] &f{player}&7: &r{message}"

  # ランク定義 — 上から順に評価し、最初にパーミッションがマッチしたランクを使用します。
  # permission が空 "" のエントリはデフォルトランクとして扱われます。
  # ランクを追加したい場合はエントリを上に追加してください。
  ranks:
    - name: "管理者"
      permission: "himatsudo.admin"
      prefix-color: "&c"       # 赤

    - name: "モデレーター"
      permission: "himatsudo.mod"
      prefix-color: "&6"       # 橙

    - name: "ビルダー"
      permission: "himatsudo.builder"
      prefix-color: "&b"       # 水色

    - name: "一般"
      permission: ""           # 空 = デフォルトランク (全プレイヤーに適用)
      prefix-color: "&7"       # グレー
